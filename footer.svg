<svg viewBox="0 0 1200 460" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Syauqi Nuzul Abdi. Software, like renewable energy, only matters if it still works after the novelty wears off.">
<defs>

  <radialGradient id="fAuroraEmerald" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#10B981" stop-opacity="0.35"/>
    <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="fAuroraCyan" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.25"/>
    <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
  </radialGradient>

  <linearGradient id="waveA" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#10B981" stop-opacity="0.22"/>
    <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="waveB" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.16"/>
    <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="waveC" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#A78BFA" stop-opacity="0"/>
  </linearGradient>

  <filter id="fBlurXL" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="50"/>
  </filter>

  <style>
    .fBlobA { animation: fDriftA 17s ease-in-out infinite; }
    .fBlobB { animation: fDriftB 20s ease-in-out infinite; }
    @keyframes fDriftA { 0%,100% { transform: translate(0,0); } 50% { transform: translate(24px,-14px); } }
    @keyframes fDriftB { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-22px,12px); } }

    .waveLayerA { animation: waveDriftA 12s ease-in-out infinite; }
    .waveLayerB { animation: waveDriftB 16s ease-in-out infinite; }
    .waveLayerC { animation: waveDriftC 20s ease-in-out infinite; }
    @keyframes waveDriftA { 0%,100% { transform: translateX(0); } 50% { transform: translateX(-30px); } }
    @keyframes waveDriftB { 0%,100% { transform: translateX(0); } 50% { transform: translateX(26px); } }
    @keyframes waveDriftC { 0%,100% { transform: translateX(0); } 50% { transform: translateX(-18px); } }

    .fParticle { animation-name: fTwinkle; animation-timing-function: ease-in-out; animation-iteration-count: infinite; }
    @keyframes fTwinkle { 0%,100% { opacity: .05; } 50% { opacity: .6; } }

    .fDivider { animation: fDividerPulse 4s ease-in-out infinite; }
    @keyframes fDividerPulse { 0%,100% { opacity: .35; } 50% { opacity: .85; } }

    .heart { animation: heartBeat 2.6s ease-in-out infinite; transform-origin: 600px 360px; }
    @keyframes heartBeat { 0%,100% { transform: scale(1); opacity:.55; } 50% { transform: scale(1.18); opacity:.9; } }
  </style>
</defs>

<rect width="1200" height="460" fill="#0D1117"/>

<!-- ambient aurora -->
<g class="fBlobA"><circle cx="240" cy="120" r="200" fill="url(#fAuroraEmerald)" filter="url(#fBlurXL)"/></g>
<g class="fBlobB"><circle cx="960" cy="150" r="190" fill="url(#fAuroraCyan)" filter="url(#fBlurXL)"/></g>

<!-- floating particles -->
<g fill="#E6EDF3">
  <circle class="fParticle" cx="120" cy="90" r="1.6" style="animation-delay:.2s; animation-duration:5s"/>
  <circle class="fParticle" cx="260" cy="60" r="2" style="animation-delay:1.4s; animation-duration:6s"/>
  <circle class="fParticle" cx="430" cy="100" r="1.4" style="animation-delay:.8s; animation-duration:4.5s"/>
  <circle class="fParticle" cx="760" cy="70" r="1.8" style="animation-delay:2.1s; animation-duration:5.5s"/>
  <circle class="fParticle" cx="900" cy="110" r="1.5" style="animation-delay:.5s; animation-duration:6.5s"/>
  <circle class="fParticle" cx="1050" cy="80" r="2" style="animation-delay:1.8s; animation-duration:5s"/>
  <circle class="fParticle" cx="600" cy="50" r="1.6" style="animation-delay:1s; animation-duration:7s"/>
  <circle class="fParticle" cx="340" cy="150" r="1.3" style="animation-delay:2.5s; animation-duration:5s"/>
  <circle class="fParticle" cx="1140" cy="140" r="1.6" style="animation-delay:.3s; animation-duration:6s"/>
</g>

<!-- flowing wave mesh, horizon at the base -->
<g class="waveLayerC"><path d="M0,460 C160,300 320,340 480,300 C640,260 800,330 960,290 C1060,265 1140,300 1200,280 L1200,460 Z" fill="url(#waveC)"/></g>
<g class="waveLayerB"><path d="M0,460 C150,340 330,380 480,335 C650,285 820,360 980,320 C1080,295 1150,330 1200,310 L1200,460 Z" fill="url(#waveB)"/></g>
<g class="waveLayerA"><path d="M0,460 C140,380 300,410 470,375 C630,340 810,400 970,365 C1075,342 1150,372 1200,355 L1200,460 Z" fill="url(#waveA)"/></g>

<!-- traveling pulse line -->
<path d="M80,210 L520,210 L538,182 L556,238 L574,186 L592,210 L1120,210" fill="none" stroke="#10B981" stroke-width="1.5" stroke-opacity="0.3"/>
<path d="M80,210 L520,210 L538,182 L556,238 L574,186 L592,210 L1120,210" fill="none" stroke="#10B981" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="50 1100">
  <animate attributeName="stroke-dashoffset" from="0" to="-1150" dur="4s" repeatCount="indefinite"/>
</path>

<!-- center content -->
<g text-anchor="middle">
  <text x="600" y="270" font-family="'JetBrains Mono', Consolas, monospace" font-size="30" fill="#10B981" class="heart">&lt;/&gt;</text>

  <text x="600" y="320" font-family="'Helvetica Neue', Arial, sans-serif" font-size="26" font-style="italic" fill="#F0F6FC">Software, like renewable energy,</text>
  <text x="600" y="354" font-family="'Helvetica Neue', Arial, sans-serif" font-size="26" font-style="italic" fill="#F0F6FC">only matters if it still works after the novelty wears off.</text>

  <g class="fDivider">
    <line x1="560" y1="380" x2="640" y2="380" stroke="#10B981" stroke-width="1.5"/>
  </g>

  <g>
    <rect x="478" y="402" width="244" height="32" rx="16" fill="none" stroke="#10B981" stroke-opacity="0.45" stroke-width="1.2"/>
    <text x="600" y="423" font-family="'JetBrains Mono', Consolas, monospace" font-size="14" letter-spacing="1.5" fill="#10B981">CODE · LEARN · IMPROVE</text>
  </g>
</g>

<text x="40" y="445" font-family="'JetBrains Mono', Consolas, monospace" font-size="13" fill="#8B949E" opacity="0.7">SYAUQI NUZUL ABDI · BONTANG, INDONESIA</text>
<text x="1160" y="445" text-anchor="end" font-family="'JetBrains Mono', Consolas, monospace" font-size="13" fill="#8B949E" opacity="0.55">JOUQIO © 2026</text>

</svg>
